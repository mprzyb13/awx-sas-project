---
- name: Generate flat client_join_status report for SQL-first importer
  hosts: all
  gather_facts: true
  become: true

  vars:
    join_status_reports_host: "127.0.0.1"
    join_status_reports_dir: "/var/lib/awx/projects/reports"
    join_status_csv_name: "client_join_status_report.csv"
    join_status_vastool_candidates:
      - /opt/quest/bin/vastool
      - /opt/quest/sbin/vastool
      - /usr/bin/vastool

  pre_tasks:
    - name: Verify reports directory exists on controller
      become: false
      ansible.builtin.stat:
        path: "{{ join_status_reports_dir }}"
      register: join_reports_dir_stat
      delegate_to: "{{ join_status_reports_host }}"
      run_once: true

    - name: Stop if reports directory is missing on controller
      become: false
      ansible.builtin.fail:
        msg: "Directory {{ join_status_reports_dir }} does not exist on controller. Create it once outside this playbook."
      when: not join_reports_dir_stat.stat.exists
      delegate_to: "{{ join_status_reports_host }}"
      run_once: true

    - name: Try to remove legacy JSON-style client_join_report.csv from controller
      become: false
      ansible.builtin.file:
        path: "{{ join_status_reports_dir }}/client_join_report.csv"
        state: absent
      delegate_to: "{{ join_status_reports_host }}"
      run_once: true
      failed_when: false

  tasks:
    - name: Find vastool binary from known locations
      ansible.builtin.stat:
        path: "{{ item }}"
      loop: "{{ join_status_vastool_candidates }}"
      register: vastool_candidate_stats
      changed_when: false

    - name: Set chosen vastool path
      ansible.builtin.set_fact:
        join_status_vastool_bin: >-
          {{
            (
              vastool_candidate_stats.results
              | selectattr('stat.exists', 'equalto', true)
              | map(attribute='stat.path')
              | list
              | first
            ) | default('')
          }}

    - name: Collect vastool status
      ansible.builtin.shell: |
        set -o pipefail
        if [ -x "{{ join_status_vastool_bin }}" ]; then
          "{{ join_status_vastool_bin }}" status 2>&1
        else
          echo "vastool not installed"
          exit 127
        fi
      args:
        executable: /bin/bash
      register: vastool_status_cmd
      changed_when: false
      failed_when: false

    - name: Collect SAS version
      ansible.builtin.shell: |
        set -o pipefail
        if [ -x "{{ join_status_vastool_bin }}" ]; then
          "{{ join_status_vastool_bin }}" -v 2>/dev/null | head -n 1
        else
          true
        fi
      args:
        executable: /bin/bash
      register: sas_version_cmd
      changed_when: false
      failed_when: false

    - name: Collect AD domain using vastool or realm
      ansible.builtin.shell: |
        set -o pipefail

        if [ -x "{{ join_status_vastool_bin }}" ]; then
          (
            "{{ join_status_vastool_bin }}" info domain 2>/dev/null || true
            "{{ join_status_vastool_bin }}" status 2>/dev/null || true
          ) | awk -F': *' '
            /^[Dd]omain Name/ {print $2; exit}
            /^[Dd]omain/ {print $2; exit}
            /joined to domain/ {
              for (i = 1; i <= NF; i++) {
                if ($i == "domain") { print $(i+1); exit }
              }
            }
          '
          exit 0
        fi

        if command -v realm >/dev/null 2>&1; then
          realm list 2>/dev/null | awk -F': *' '
            /^[[:space:]]*domain-name:/ {print $2; exit}
            /^[[:space:]]*realm-name:/ {print $2; exit}
          '
          exit 0
        fi

        true
      args:
        executable: /bin/bash
      register: ad_domain_cmd
      changed_when: false
      failed_when: false

    - name: Derive join status report values
      ansible.builtin.set_fact:
        join_status_group_csv: >-
          {{
            (
              group_names
              | reject('equalto', 'all')
              | reject('equalto', 'ungrouped')
              | list
              | join('|')
            ) if (
              group_names
              | reject('equalto', 'all')
              | reject('equalto', 'ungrouped')
              | list
              | length
            ) > 0 else 'ungrouped'
          }}
        join_status_ip_address: "{{ ansible_default_ipv4.address | default(ansible_all_ipv4_addresses[0] | default(ansible_host | default(''))) }}"
        join_status_sas_version: >-
          {{
            (sas_version_cmd.stdout | default('') | regex_search('([0-9]+(?:\.[0-9]+)+)', '\1') | first)
            if (sas_version_cmd.stdout | default('') | length > 0)
            else ''
          }}
        join_status_ad_domain: "{{ ad_domain_cmd.stdout | default('') | trim }}"
        join_status_failed: >-
          {{
            (
              join_status_vastool_bin | length == 0
              or vastool_status_cmd.rc | int != 0
              or (ad_domain_cmd.stdout | default('') | trim | length == 0)
            )
          }}
        join_status_unreachable: false

  post_tasks:
    - name: Build flat client_join_status_report.csv on controller
      become: false
      ansible.builtin.copy:
        dest: "{{ join_status_reports_dir }}/{{ join_status_csv_name }}"
        mode: "0640"
        content: |
          hostname,group,ip_address,os_distro,os_version,sas_version,ad_domain,unreachable,failed
          {% for h in ansible_play_hosts_all | sort %}
          {{ hostvars[h].inventory_hostname | default('') | replace(',', ' ') }},{{ hostvars[h].join_status_group_csv | default('ungrouped') | replace(',', '|') }},{{ hostvars[h].join_status_ip_address | default('') | replace(',', ' ') }},{{ hostvars[h].ansible_distribution | default('') | replace(',', ' ') }},{{ hostvars[h].ansible_distribution_version | default('') | replace(',', ' ') }},{{ hostvars[h].join_status_sas_version | default('') | replace(',', ' ') }},{{ hostvars[h].join_status_ad_domain | default('') | replace(',', ' ') }},{{ hostvars[h].join_status_unreachable | default(false) }},{{ hostvars[h].join_status_failed | default(true) }}
          {% endfor %}
      delegate_to: "{{ join_status_reports_host }}"
      run_once: true

    - name: Show generated report path and detected vastool
      ansible.builtin.debug:
        msg:
          - "Generated: {{ join_status_reports_dir }}/{{ join_status_csv_name }}"
          - "Detected vastool: {{ join_status_vastool_bin | default('') }}"
      run_once: false
