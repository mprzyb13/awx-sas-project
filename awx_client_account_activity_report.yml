---
- name: Generate client account activity report compatible with SQL-first importer (minimal privilege signals)
  hosts: all
  gather_facts: true
  become: true

  vars:
    account_activity_window_days: 30
    account_activity_reports_host: "127.0.0.1"
    account_activity_reports_dir: "/var/lib/awx/projects/reports/account_activity"
    account_activity_raw_dir: "{{ account_activity_reports_dir }}/raw"
    account_activity_local_workdir: "/var/tmp/account_activity_collect"
    account_activity_csv_name: "client_account_activity_report.csv"

    # Legacy switches kept for template compatibility. They are intentionally disabled
    # in this lightweight profile because the heavy log collection was the main source
    # of runtime and payload size growth.
    # Lightweight login signal used to keep importer compatibility and basic activity context.
    account_activity_collect_lastlog: true
    account_activity_collect_last: false
    account_activity_collect_lastb: false
    account_activity_collect_faillock: false
    account_activity_collect_journalctl: false
    account_activity_collect_authlog: false
    account_activity_collect_auditd: false
    account_activity_collect_who: false
    account_activity_collect_w: false

    # New lightweight privilege-focused signals.
    account_activity_collect_passwd_status: true
    account_activity_collect_sudoers: true
    account_activity_collect_authorized_keys: true
    account_activity_collect_su_config: true
    account_activity_collect_systemd_service_users: true

    # Configurable helper lists used later by the parser/AI module.
    account_activity_privileged_group_names:
      - root
      - wheel
      - sudo
      - adm
      - admin
    account_activity_privileged_group_gids:
      - 0

  pre_tasks:
    - name: Ensure local workdir exists on managed host
      ansible.builtin.file:
        path: "{{ account_activity_local_workdir }}"
        state: directory
        mode: "0750"

    - name: Ensure reports directories exist on controller
      become: false
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0750"
      loop:
        - "{{ account_activity_reports_dir }}"
        - "{{ account_activity_raw_dir }}"
      delegate_to: "{{ account_activity_reports_host }}"

    - name: Capture UTC collection timestamp
      ansible.builtin.set_fact:
        account_activity_collected_at_utc: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%SZ') }}"

    - name: Detect platform-specific collection hints
      ansible.builtin.set_fact:
        account_activity_platform_family: >-
          {% set distro = (ansible_distribution | default('') | lower) %}
          {% set family = (ansible_os_family | default('') | lower) %}
          {% if distro in ['almalinux', 'rocky', 'redhat'] or family == 'redhat' %}
          rhel_like
          {% elif distro in ['ubuntu', 'debian'] or family == 'debian' %}
          debian_like
          {% else %}
          generic_linux
          {% endif %}
        account_activity_auth_log_hint: >-
          {% if (ansible_os_family | default('') | lower) == 'redhat' %}
          /var/log/secure*
          {% elif (ansible_os_family | default('') | lower) == 'debian' %}
          /var/log/auth.log*
          {% else %}
          /var/log/secure* or /var/log/auth.log*
          {% endif %}
        account_activity_ssh_service_hint: >-
          {% if (ansible_os_family | default('') | lower) == 'debian' %}
          ssh/ssh.socket/sshd
          {% else %}
          sshd/sshd.socket/ssh
          {% endif %}

    - name: Collect local passwd database only
      ansible.builtin.command: cat /etc/passwd
      register: local_passwd_cmd
      changed_when: false

    - name: Collect local group database only
      ansible.builtin.command: cat /etc/group
      register: local_group_cmd
      changed_when: false

    - name: Collect redacted shadow summary
      ansible.builtin.shell: |
        awk -F: '
          {
            state="OTHER";
            pw=$2;
            if (pw == "") state="EMPTY";
            else if (pw == "*" || pw == "!*" || pw == "!" || pw == "!!" || pw ~ /^!/) state="LOCKED";
            else if (pw ~ /^\$/ || pw ~ /^y\$/) state="HASH";
            printf "%s|%s|%s|%s|%s|%s|%s|%s\n", $1, state, $3, $4, $5, $6, $7, $8;
          }
        ' /etc/shadow
      args:
        executable: /bin/bash
      register: shadow_summary_cmd
      changed_when: false
      failed_when: false
      no_log: true

    - name: Build local user list from /etc/passwd
      ansible.builtin.set_fact:
        account_activity_local_users: >-
          {{
            local_passwd_cmd.stdout_lines
            | map('split', ':')
            | selectattr('0', 'defined')
            | map('first')
            | list
          }}

  tasks:
    - name: Collect passwd -S for each local user
      ansible.builtin.command: "passwd -S {{ item }}"
      register: passwd_status_cmd
      changed_when: false
      failed_when: false
      loop: "{{ account_activity_local_users }}"
      when: account_activity_collect_passwd_status

    - name: Evaluate sudo privileges for each local user
      ansible.builtin.command: "sudo -n -l -U {{ item }}"
      register: sudo_list_cmd
      changed_when: false
      failed_when: false
      loop: "{{ account_activity_local_users }}"
      when: account_activity_collect_sudoers

    - name: Collect authorized_keys metadata
      ansible.builtin.shell: |
        set -o pipefail
        awk -F: '{print $1":"$6}' /etc/passwd | while IFS=: read -r u h; do
          if [ -n "$h" ] && [ -f "$h/.ssh/authorized_keys" ]; then
            echo "$u|$h/.ssh/authorized_keys|$(wc -l < "$h/.ssh/authorized_keys")"
          fi
        done
      args:
        executable: /bin/bash
      register: authorized_keys_cmd
      changed_when: false
      failed_when: false
      when: account_activity_collect_authorized_keys

    - name: Detect su command path
      ansible.builtin.shell: |
        if command -v su >/dev/null 2>&1; then
          command -v su
        fi
      args:
        executable: /bin/bash
      register: su_command_cmd
      changed_when: false
      failed_when: false
      when: account_activity_collect_su_config

    - name: Collect relevant su PAM configuration lines
      ansible.builtin.shell: |
        for f in /etc/pam.d/su /etc/pam.d/su-l; do
          if [ -f "$f" ]; then
            awk '
              /^[[:space:]]*#/ { next }
              /pam_wheel\.so|pam_rootok\.so|pam_unix\.so/ {
                print FILENAME "|" $0
              }
            ' "$f"
          fi
        done
      args:
        executable: /bin/bash
      register: pam_su_cmd
      changed_when: false
      failed_when: false
      when: account_activity_collect_su_config

    - name: Collect systemd service User mappings
      ansible.builtin.shell: |
        set -o pipefail
        for base in /etc/systemd/system /run/systemd/system /usr/lib/systemd/system /lib/systemd/system; do
          [ -d "$base" ] || continue
          find "$base" -type f -name '*.service' -print0 2>/dev/null
        done | while IFS= read -r -d '' f; do
          user=$(awk -F= '
            /^[[:space:]]*#/ { next }
            /^[[:space:]]*User[[:space:]]*=/ {
              gsub(/^[[:space:]]+|[[:space:]]+$/, "", $2);
              print $2;
              exit
            }
          ' "$f")
          if [ -n "$user" ]; then
            printf "%s|%s|%s\n" "$user" "$f" "$(basename "$f" .service)"
          fi
        done | awk '!seen[$0]++'
      args:
        executable: /bin/bash
      register: systemd_service_users_cmd
      changed_when: false
      failed_when: false
      when: account_activity_collect_systemd_service_users

    - name: Save raw payload on target
      ansible.builtin.copy:
        dest: "{{ account_activity_local_workdir }}/{{ inventory_hostname }}_account_activity_raw.json"
        mode: "0600"
        content: |
          {
            "hostname": {{ inventory_hostname | to_json }},
            "host_group_csv": {{ (group_names | join(',')) | to_json }},
            "ip_address": {{
              (
                ansible_default_ipv4.address
                | default((ansible_all_ipv4_addresses | default([]) | reject('equalto', '127.0.0.1') | list | first), true)
                | default('', true)
              ) | to_json
            }},
            "inventory_host_ref": {{ ansible_host | default(inventory_hostname) | to_json }},
            "os_family": {{ ansible_os_family | default('') | to_json }},
            "os_distro": {{ ansible_distribution | default('') | to_json }},
            "os_version": {{ ansible_distribution_version | default('') | to_json }},
            "platform_family_detected": {{ account_activity_platform_family | default('') | trim | to_json }},
            "auth_log_hint": {{ account_activity_auth_log_hint | default('') | trim | to_json }},
            "ssh_service_hint": {{ account_activity_ssh_service_hint | default('') | trim | to_json }},
            "hw_arch": {{ ansible_architecture | default('') | to_json }},
            "host_time_text": {{ account_activity_collected_at_utc | to_json }},
            "changed": false,
            "unreachable": false,
            "failed": false,
            "window_days": {{ account_activity_window_days | int }},
            "configured_privileged_group_names": {{ account_activity_privileged_group_names | default([]) | to_json }},
            "configured_privileged_group_gids": {{ account_activity_privileged_group_gids | default([]) | to_json }},
            "passwd": {{ local_passwd_cmd.stdout_lines | default([]) | to_json }},
            "group": {{ local_group_cmd.stdout_lines | default([]) | to_json }},
            "shadow": {{ shadow_summary_cmd.stdout_lines | default([]) | to_json }},
            "passwd_status": {{ passwd_status_cmd.results | default([]) | to_json }},
            "lastlog": {{ lastlog_cmd.results | default([]) | to_json }},
            "sudo_list": {{ sudo_list_cmd.results | default([]) | to_json }},
            "authorized_keys": {{ authorized_keys_cmd.stdout_lines | default([]) | to_json }},
            "su_command_path": {{ su_command_cmd.stdout | default('') | trim | to_json }},
            "pam_su": {{ pam_su_cmd.stdout_lines | default([]) | to_json }},
            "systemd_service_users": {{ systemd_service_users_cmd.stdout_lines | default([]) | to_json }}
          }
      no_log: true

    - name: Fetch raw payload to controller
      ansible.builtin.fetch:
        src: "{{ account_activity_local_workdir }}/{{ inventory_hostname }}_account_activity_raw.json"
        dest: "{{ account_activity_raw_dir }}/"
        flat: true

  post_tasks:
    - name: Build consolidated client_account_activity_report.csv on controller
      become: false
      ansible.builtin.command: >-
        python3 files/build_client_account_activity_report.py
        --input-dir {{ account_activity_raw_dir }}
        --output-file {{ account_activity_reports_dir }}/{{ account_activity_csv_name }}
      delegate_to: "{{ account_activity_reports_host }}"
      changed_when: false
      run_once: true
